<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram URL Verification Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">

<div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-4xl">
  <h1 class="text-4xl font-extrabold text-center text-blue-600 mb-6">
    📡 Telegram URL Verification Tool
  </h1>

  <div class="text-center mb-6">
    <a href="{{ url_for('auth.login') }}">
      <button class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg shadow">
        🔄 Login with another account
      </button>
    </a>
  </div>

  <form id="scrapeForm" method="POST" class="mb-8">
    <label class="block text-lg font-semibold mb-2">Enter Telegram URLs (one per line):</label>
    <textarea name="channel_urls" rows="6"
      class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
      placeholder="https://t.me/example_channel" required></textarea>

    <div class="text-center mt-4 space-x-3">
      <button type="submit"
        class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-8 rounded-lg shadow">
        🚀 Check URLs
      </button>

      <button type="button" id="stopBtn"
        class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-8 rounded-lg shadow">
        🛑 Stop
      </button>

      <!-- UPDATED: download button no longer hardcoded -->
      <a href="#" 
        id="downloadBtn" type="button"
        class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-8 rounded-lg shadow">
        📥 Download CSV
      </a>
    </div>
  </form>

  <!-- Live progress logs -->
  <div>
    <h3 class="text-xl font-semibold mb-2">📡 Live URL Status:</h3>
    <div id="progressBox"
      class="border border-gray-300 p-4 h-64 overflow-y-scroll rounded-lg bg-gray-50 mb-4 text-sm font-mono leading-relaxed">
      <p class="text-gray-400 text-center">Waiting for URL verification...</p>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader" class="hidden text-center mt-4">
    <svg class="animate-spin h-8 w-8 mx-auto text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4z"></path>
    </svg>
    <p class="text-gray-600 mt-2 font-medium">Processing your URLs...</p>
  </div>

  <!-- Table -->
  <div class="mt-6 overflow-x-auto">
    <table class="min-w-full bg-white border border-gray-300 rounded-lg" id="resultsTable">
      <thead>
        <tr class="bg-blue-100 text-left">
          <th class="px-4 py-2 border-b">Post URL</th>
          <th class="px-4 py-2 border-b">Views</th>
          <th class="px-4 py-2 border-b">Post Description</th>
          <th class="px-4 py-2 border-b">Post Status</th>
        </tr>
      </thead>
      <tbody id="resultsBody">
        <tr>
          <td colspan="4" class="text-center text-gray-400 py-4">No results yet...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>


<script>
var source = new EventSource("{{ url_for('progress') }}");
source.onmessage = function (event) {
    var box = document.getElementById("progressBox");
    if (box.textContent.includes("Waiting")) box.innerHTML = "";
    box.innerHTML += event.data + "<br>";
    box.scrollTop = box.scrollHeight;

    if(event.data.includes("→ post_status:")) {
        const parts = event.data.split("→ post_status:");
        const url = parts[0].trim();
        const status = parts[1].trim();
        const tbody = document.getElementById("resultsBody");

        if(tbody.children.length === 1 && tbody.children[0].children[0].colSpan === 4) {
            tbody.innerHTML = "";
        }

        const row = document.createElement("tr");
        row.innerHTML = `
            <td class="px-4 py-2 border-b">
              <a href="${url}" target="_blank" class="text-blue-600 hover:underline">${url}</a>
            </td>
            <td class="px-4 py-2 border-b">-</td>
            <td class="px-4 py-2 border-b">-</td>
            <td class="px-4 py-2 border-b">${status}</td>
        `;
        tbody.appendChild(row);

        checkDownloadFile();
    }
};


function checkDownloadFile() {
    fetch("/check_file")
        .then(res => res.json())
        .then(data => {
            console.log("CHECK FILE RESPONSE:", data); // debug

            if (data.exists) {
                let downloadBtn = document.getElementById("downloadBtn");
                downloadBtn.classList.remove("hidden");
                downloadBtn.href = `/download/${data.file_name}`;
            }
        });
}

document.getElementById("scrapeForm").addEventListener("submit", function() {
    document.getElementById("loader").classList.remove("hidden");
    document.getElementById("progressBox").innerHTML =
        "<p class='text-blue-500'>Checking Telegram URLs...</p>";
});

document.getElementById("stopBtn").addEventListener("click", function() {
    fetch("/stop", { method: "POST" })
      .then(() => {
        const box = document.getElementById("progressBox");
        box.innerHTML += "<br><span class='text-red-600 font-semibold'>🛑 Stop requested...</span><br>";
      });
});
</script>

</body>
</html>
