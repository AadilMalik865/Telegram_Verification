<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">

    <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6">🔒 Enter OTP</h2>

        <form method="POST" action="{{ url_for('auth.verify') }}" class="space-y-4">
            <input type="text" name="code" placeholder="Enter OTP"
                   class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                   required>
            <div class="text-center">
                <button type="submit"
                        class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 px-6 rounded-lg transition-all shadow">
                    Verify
                </button>
            </div>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">Please enter the OTP sent to your phone.</p>
    </div>

</body>
</html>
