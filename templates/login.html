<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-10">

    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6">🔑 Telegram Login</h1>

        <form method="POST" class="flex flex-col gap-4">
            <input type="text" name="phone" placeholder="Enter phone number"
                class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" required>
            <button type="submit"
                class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded transition-all">
                Send OTP
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('home') }}" class="text-blue-600 hover:underline">
                Back to Home
            </a>
        </div>
    </div>

</body>
</html>
